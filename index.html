<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <!-- 使用 Firebase 8.x CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // Firebase 配置
        var firebaseConfig = {
            apiKey: "AIzaSyCZijBiCDp6HWCQQlI8Y2Xaf5ve4r2-6oA",
            authDomain: "snakegame-df627.firebaseapp.com",
            databaseURL: "https://snakegame-df627-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "snakegame-df627",
            storageBucket: "snakegame-df627.firebasestorage.app",
            messagingSenderId: "1080130902246",
            appId: "1:1080130902246:web:03a9ecbfde885967a48327",
            measurementId: "G-8FGH164PS3"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();
        var realtimeDb = firebase.database();
        
        // 联机对战相关变量
        var currentGameId = null;
        var currentPlayer = null; // 'p1' or 'p2'
        var isOnlineMode = false;

        // 保存分数到云端
        window.saveScore = function(playerName, score, gameMode) {
            db.collection("scores").add({
                playerName: playerName || "匿名玩家",
                score: score,
                gameMode: gameMode,
                createdAt: new Date()
            }).then(function(docRef) {
                console.log("分数保存成功！");
            }).catch(function(error) {
                console.error("保存失败:", error);
            });
        }

        // 获取排行榜（支持模式筛选）
        window.getLeaderboard = function(gameMode, callback) {
            db.collection("scores").orderBy("score", "desc").limit(20).get()
                .then(function(querySnapshot) {
                    var leaderboard = [];
                    querySnapshot.forEach(function(doc) {
                        var data = doc.data();
                        // 前端筛选模式
                        if (!gameMode || gameMode === 'all' || data.gameMode === gameMode) {
                            leaderboard.push({
                                id: doc.id,
                                playerName: data.playerName,
                                score: data.score,
                                gameMode: data.gameMode
                            });
                        }
                    });
                    // 限制只返回前10条
                    callback(leaderboard.slice(0, 10));
                })
                .catch(function(error) {
                    console.error("获取排行榜失败:", error);
                    callback([]);
                });
        }
        
        // ==================== 联机对战功能 ====================
        
        // 创建房间
        window.createRoom = function(playerName) {
            return new Promise(function(resolve, reject) {
                var gameRef = realtimeDb.ref('games').push();
                var gameId = gameRef.key;
                
                gameRef.set({
                    state: 'waiting',
                    players: {
                        p1: {
                            id: gameId + '_p1',
                            name: playerName || '玩家1',
                            ready: false
                        },
                        p2: null
                    },
                    snake1: { segments: [], direction: 'right' },
                    snake2: { segments: [], direction: 'left' },
                    food: { x: 10, y: 10 },
                    scores: { p1: 0, p2: 0 },
                    createdAt: Date.now()
                }, function(error) {
                    if (error) {
                        reject(error);
                    } else {
                        currentGameId = gameId;
                        currentPlayer = 'p1';
                        isOnlineMode = true;
                        resolve({ gameId: gameId, player: 'p1' });
                    }
                });
            });
        };
        
        // 加入房间
        window.joinRoom = function(gameId, playerName) {
            return new Promise(function(resolve, reject) {
                var gameRef = realtimeDb.ref('games/' + gameId);
                
                gameRef.once('value', function(snapshot) {
                    var gameData = snapshot.val();
                    
                    if (!gameData) {
                        reject('房间不存在');
                        return;
                    }
                    
                    if (gameData.state !== 'waiting') {
                        reject('房间已满或游戏已开始');
                        return;
                    }
                    
                    gameRef.update({
                        'players/p2': {
                            id: gameId + '_p2',
                            name: playerName || '玩家2',
                            ready: false
                        },
                        state: 'ready'
                    }, function(error) {
                        if (error) {
                            reject(error);
                        } else {
                            currentGameId = gameId;
                            currentPlayer = 'p2';
                            isOnlineMode = true;
                            resolve({ gameId: gameId, player: 'p2' });
                        }
                    });
                });
            });
        };
        
        // 获取房间列表
        window.getRooms = function(callback) {
            realtimeDb.ref('games').orderByChild('state').equalTo('waiting').limitToFirst(10).once('value', function(snapshot) {
                var rooms = [];
                snapshot.forEach(function(childSnapshot) {
                    var roomData = childSnapshot.val();
                    rooms.push({
                        id: childSnapshot.key,
                        players: roomData.players,
                        createdAt: roomData.createdAt
                    });
                });
                callback(rooms);
            });
        };
        
        // 设置玩家准备状态
        window.setReady = function(isReady) {
            if (!currentGameId || !currentPlayer) return;
            
            realtimeDb.ref('games/' + currentGameId + '/players/' + currentPlayer + '/ready').set(isReady);
        };
        
        // 发送玩家操作
        window.sendPlayerMove = function(direction) {
            if (!currentGameId || !currentPlayer) return;
            
            var snakeKey = currentPlayer === 'p1' ? 'snake1' : 'snake2';
            realtimeDb.ref('games/' + currentGameId + '/' + snakeKey + '/direction').set(direction);
        };
        
        // 监听游戏状态
        window.listenToGame = function(gameId, callback) {
            realtimeDb.ref('games/' + gameId).on('value', function(snapshot) {
                var gameData = snapshot.val();
                if (gameData) {
                    callback(gameData);
                }
            });
        };
        
        // 离开房间
        window.leaveRoom = function() {
            if (!currentGameId) return;
            
            realtimeDb.ref('games/' + currentGameId).off();
            
            // 如果是玩家1且房间还在等待状态，删除房间
            if (currentPlayer === 'p1') {
                realtimeDb.ref('games/' + currentGameId).once('value', function(snapshot) {
                    var gameData = snapshot.val();
                    if (gameData && gameData.state === 'waiting') {
                        realtimeDb.ref('games/' + currentGameId).remove();
                    }
                });
            }
            
            currentGameId = null;
            currentPlayer = null;
            isOnlineMode = false;
        };
    </script>

<body>
    <div class="main-container">
        <!-- 左侧排行榜 - 简单模式 -->
        <div class="leaderboard-panel left-panel">
            <h4 style="color: #3498db; margin-bottom: 10px; text-align: center;">🌊 简单模式排行榜</h4>
            <div id="easyLeaderboard"></div>
        </div>
        
        <!-- 游戏主区域 -->
        <div class="game-container">
            <h1>🐍 贪吃蛇</h1>
            
            <!-- 模式选择 -->
            <div class="mode-selector">
                <button class="mode-btn active" id="easyMode">简单模式</button>
                <button class="mode-btn" id="hardMode">困难模式</button>
            </div>
            <div class="current-mode" id="currentMode">当前模式：简单模式</div>
            
            <!-- 联机对战面板 -->
            <div class="online-panel">
                <h3 class="online-title">🎮 联机对战</h3>
                <div style="text-align: center;">
                    <input type="text" class="room-input" id="playerNameInput" placeholder="输入你的昵称" value="匿名玩家">
                    <br>
                    <button class="online-btn create" id="createRoomBtn">创建房间</button>
                    <button class="online-btn join" id="joinRoomBtn">加入房间</button>
                    <input type="text" class="room-input" id="roomIdInput" placeholder="房间ID" style="display: none;">

                </div>
                <div id="roomList" class="room-list" style="display: none;"></div>
                <div id="roomIdDisplay" style="display: none; margin-bottom: 10px; text-align: center;"></div>
                <div id="onlineStatus" class="online-status"></div>
                <div id="playerIndicator" class="player-indicator" style="display: none;"></div>
                <button class="online-btn" id="leaveRoomBtn" style="display: none;">离开房间</button>
            </div>
            
            <!-- 分数显示 -->
            <div class="score-board">得分: <span class="score" id="score">0</span></div>
            
            <!-- 双人对战分数 -->
            <div id="onlineScoreBoard" style="display: none; color: #fff; font-size: 1.2em; margin-bottom: 10px;">
                <span style="color: #3498db;">玩家1:</span> <span id="p1Score">0</span> 
                <span style="margin: 0 20px;">VS</span> 
                <span style="color: #e74c3c;">玩家2:</span> <span id="p2Score">0</span>
            </div>
            
            <!-- 游戏画布 -->
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <!-- 游戏状态 -->
            <div class="game-over" id="gameOver">游戏结束！</div>
            <div class="game-paused" id="gamePaused">⏸️ 游戏暂停</div>
            
            <!-- 游戏控制按钮 -->
            <button class="btn" id="startBtn">开始游戏</button>

            <!-- 操作提示 -->

                <p>使用方向键 ↑ ↓ ← → 控制蛇的移动</p>
            </div>

        <!-- 右侧排行榜 - 困难模式 -->
        <div class="leaderboard-panel right-panel">
            <h4 style="color: #e74c3c; margin-bottom: 10px; text-align: center;">🔥 困难模式排行榜</h4>
            <div id="hardLeaderboard"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const gamePausedElement = document.getElementById('gamePaused');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const exitBtn = document.getElementById('exitBtn');
        const easyModeBtn = document.getElementById('easyMode');
        const hardModeBtn = document.getElementById('hardMode');
        const currentModeElement = document.getElementById('currentMode');
        const easyLeaderboardElement = document.getElementById('easyLeaderboard');
        const hardLeaderboardElement = document.getElementById('hardLeaderboard');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop = null;
        let isGameRunning = false;
        let isPaused = false;
        let gameMode = 'easy';

        function initGame() {
            snake = [{x: 10 * gridSize, y: 10 * gridSize}];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            generateFood();
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount) * gridSize,
                    y: Math.floor(Math.random() * tileCount) * gridSize
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        function drawGame() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#4ecca3';
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#6effd5';
                } else {
                    ctx.fillStyle = '#4ecca3';
                }
                ctx.fillRect(segment.x, segment.y, gridSize - 2, gridSize - 2);
            });

            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(food.x + gridSize / 2, food.y + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function updateGame() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                if (gameMode === 'easy') {
                    if (head.x < 0) head.x = canvas.width - gridSize;
                    else if (head.x >= canvas.width) head.x = 0;
                    if (head.y < 0) head.y = canvas.height - gridSize;
                    else if (head.y >= canvas.height) head.y = 0;
                } else {
                    endGame();
                    return;
                }
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(gameLoop);
            gameOverElement.style.display = 'block';
            startBtn.textContent = '重新开始';
            
            var playerName = prompt('游戏结束！请输入你的昵称：') || '匿名玩家';
            saveScore(playerName, score, gameMode);
            
            // 延迟刷新排行榜（确保数据已保存）
            setTimeout(refreshLeaderboards, 500);
        }

        function gameStep() {
            updateGame();
            drawGame();
        }

        function startGame() {
            if (isGameRunning) return;
            
            isGameRunning = true;
            initGame();
            startBtn.textContent = '游戏中...';
            gameLoop = setInterval(gameStep, 100);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!isGameRunning) {
                    startGame();
                }
                return;
            }
            
            if (!isGameRunning || isPaused) return;
            
            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -gridSize; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = gridSize; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -gridSize; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = gridSize; dy = 0; }
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);

        pauseBtn.addEventListener('click', () => {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            
            if (isPaused) {
                clearInterval(gameLoop);
                gamePausedElement.style.display = 'block';
                pauseBtn.textContent = '▶️ 继续';
            } else {
                gamePausedElement.style.display = 'none';
                pauseBtn.textContent = '⏸️ 暂停';
                gameLoop = setInterval(gameStep, 100);
            }
        });

        exitBtn.addEventListener('click', () => {
            if (!isGameRunning) return;
            
            isGameRunning = false;
            isPaused = false;
            clearInterval(gameLoop);
            gameOverElement.style.display = 'none';
            gamePausedElement.style.display = 'none';
            startBtn.textContent = '开始游戏';
            pauseBtn.textContent = '⏸️ 暂停';
            drawGame();
        });

        easyModeBtn.addEventListener('click', () => {
            if (isGameRunning) return;
            gameMode = 'easy';
            easyModeBtn.classList.add('active');
            hardModeBtn.classList.remove('active');
            currentModeElement.textContent = '当前模式：简单模式';
        });

        hardModeBtn.addEventListener('click', () => {
            if (isGameRunning) return;
            gameMode = 'hard';
            hardModeBtn.classList.add('active');
            easyModeBtn.classList.remove('active');
            currentModeElement.textContent = '当前模式：困难模式';
        });

        function loadLeaderboards() {
            getLeaderboard('easy', function(easyData) {
                if (easyData.length > 0) {
                    easyLeaderboardElement.innerHTML = easyData.map((item, index) => {
                        return '<div class="leaderboard-item">' +
                            '<span class="leaderboard-rank">' + (index + 1) + '</span>' +
                            '<span class="leaderboard-name">' + item.playerName + '</span>' +
                            '<span class="leaderboard-score">' + item.score + '</span>' +
                            '</div>';
                    }).join('');
                } else {
                    easyLeaderboardElement.innerHTML = '<p style="color: #888; text-align: center;">暂无数据</p>';
                }
            });
            
            getLeaderboard('hard', function(hardData) {
                if (hardData.length > 0) {
                    hardLeaderboardElement.innerHTML = hardData.map((item, index) => {
                        return '<div class="leaderboard-item">' +
                            '<span class="leaderboard-rank">' + (index + 1) + '</span>' +
                            '<span class="leaderboard-name">' + item.playerName + '</span>' +
                            '<span class="leaderboard-score">' + item.score + '</span>' +
                            '</div>';
                    }).join('');
                } else {
                    hardLeaderboardElement.innerHTML = '<p style="color: #888; text-align: center;">暂无数据</p>';
                }
            });
        }

        // 页面加载时自动加载排行榜
        loadLeaderboards();
        
        // 游戏结束后刷新排行榜
        function refreshLeaderboards() {
            loadLeaderboards();
        }

        drawGame();
        
        // ==================== 联机对战事件处理 ====================
        
        // 获取 DOM 元素
        var playerNameInput = document.getElementById('playerNameInput');
        var createRoomBtn = document.getElementById('createRoomBtn');
        var joinRoomBtn = document.getElementById('joinRoomBtn');
        var roomIdInput = document.getElementById('roomIdInput');
        var refreshRoomsBtn = document.getElementById('refreshRoomsBtn');
        var roomList = document.getElementById('roomList');
        var onlineStatus = document.getElementById('onlineStatus');
        var playerIndicator = document.getElementById('playerIndicator');
        var leaveRoomBtn = document.getElementById('leaveRoomBtn');
        var onlineScoreBoard = document.getElementById('onlineScoreBoard');
        var p1ScoreElement = document.getElementById('p1Score');
        var p2ScoreElement = document.getElementById('p2Score');
        var roomIdDisplay = document.getElementById('roomIdDisplay');
        
        // 双人对战相关变量
        var onlineSnake1 = [];
        var onlineSnake2 = [];
        var onlineFood = { x: 10, y: 10 };
        var onlineGameLoop = null;
        var currentRoomId = null;
        
        // 创建房间
        createRoomBtn.addEventListener('click', function() {
            var playerName = playerNameInput.value || '匿名玩家';
            
            createRoom(playerName).then(function(result) {
                // 保存房间ID
                currentRoomId = result.gameId;
                
                // 使用单独的元素显示房间ID（不会被状态更新覆盖）
                roomIdDisplay.innerHTML = '<span class="status-online">房间ID: <code style="background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 5px; color: #4ecca3; font-size: 1.2em;">' + result.gameId + '</code></span><br>';
                roomIdDisplay.innerHTML += '<button onclick="copyRoomId(\'' + result.gameId + '\')" style="margin-top: 10px; padding: 8px 15px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 15px; cursor: pointer;">📋 复制房间ID</button>';
                roomIdDisplay.style.display = 'block';
                
                onlineStatus.innerHTML = '<span class="status-waiting">⏳ 等待其他玩家加入...</span>';
                
                createRoomBtn.style.display = 'none';
                joinRoomBtn.style.display = 'none';
                roomIdInput.style.display = 'none';
                refreshRoomsBtn.style.display = 'none';
                roomList.style.display = 'none';
                leaveRoomBtn.style.display = 'inline-block';
                
                // 监听房间状态
                listenToGame(result.gameId, handleOnlineGameUpdate);
            }).catch(function(error) {
                onlineStatus.innerHTML = '<span style="color: #e74c3c;">创建房间失败: ' + error + '</span>';
            });
        });
        
        // 加入房间
        joinRoomBtn.addEventListener('click', function() {
            if (roomIdInput.style.display === 'none') {
                // 显示房间输入框和房间列表
                roomIdInput.style.display = 'inline-block';
                refreshRoomsBtn.style.display = 'inline-block';
                roomList.style.display = 'block';
                refreshRoomList();
            } else {
                // 尝试加入房间
                var roomId = roomIdInput.value.trim();
                var playerName = playerNameInput.value || '匿名玩家';
                
                if (!roomId) {
                    onlineStatus.innerHTML = '<span style="color: #e74c3c;">请输入房间ID</span>';
                    return;
                }
                
                joinRoom(roomId, playerName).then(function(result) {
                    onlineStatus.innerHTML = '<span class="status-online">✅ 成功加入房间！</span>';
                    
                    createRoomBtn.style.display = 'none';
                    joinRoomBtn.style.display = 'none';
                    roomIdInput.style.display = 'none';
                    refreshRoomsBtn.style.display = 'none';
                    roomList.style.display = 'none';
                    leaveRoomBtn.style.display = 'inline-block';
                    
                    // 监听房间状态
                    listenToGame(result.gameId, handleOnlineGameUpdate);
                }).catch(function(error) {
                    onlineStatus.innerHTML = '<span style="color: #e74c3c;">加入失败: ' + error + '</span>';
                });
            }
        });
        
        // 刷新房间列表
        refreshRoomsBtn.addEventListener('click', refreshRoomList);
        
        function refreshRoomList() {
            getRooms(function(rooms) {
                if (rooms.length === 0) {
                    roomList.innerHTML = '<p style="color: #888; text-align: center;">暂无可用房间</p>';
                    return;
                }
                
                roomList.innerHTML = rooms.map(function(room) {
                    return '<div class="room-item" onclick="joinRoomDirect(\'' + room.id + '\')">' +
                        '<div class="room-id">房间ID: ' + room.id + '</div>' +
                        '<div class="room-player">创建者: ' + (room.players.p1 ? room.players.p1.name : '未知') + '</div>' +
                        '</div>';
                }).join('');
            });
        }
        
        // 直接加入房间
        window.joinRoomDirect = function(roomId) {
            roomIdInput.value = roomId;
            var playerName = playerNameInput.value || '匿名玩家';
            
            joinRoom(roomId, playerName).then(function(result) {
                onlineStatus.innerHTML = '<span class="status-online">✅ 成功加入房间！</span>';
                
                createRoomBtn.style.display = 'none';
                joinRoomBtn.style.display = 'none';
                roomIdInput.style.display = 'none';
                refreshRoomsBtn.style.display = 'none';
                roomList.style.display = 'none';
                leaveRoomBtn.style.display = 'inline-block';
                
                listenToGame(result.gameId, handleOnlineGameUpdate);
            }).catch(function(error) {
                onlineStatus.innerHTML = '<span style="color: #e74c3c;">加入失败: ' + error + '</span>';
            });
        };
        
        // 复制房间ID到剪贴板
        window.copyRoomId = function(roomId) {
            navigator.clipboard.writeText(roomId).then(function() {
                alert('房间ID已复制到剪贴板！');
            }).catch(function(err) {
                // 降级方案：使用文本框复制
                var tempInput = document.createElement('input');
                tempInput.value = roomId;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                alert('房间ID已复制到剪贴板！');
            });
        };
        
        // 离开房间
        leaveRoomBtn.addEventListener('click', function() {
            leaveRoom();
            
            onlineStatus.innerHTML = '';
            roomIdDisplay.innerHTML = '';
            roomIdDisplay.style.display = 'none';
            playerIndicator.innerHTML = '';
            playerIndicator.style.display = 'none';
            onlineScoreBoard.style.display = 'none';
            
            createRoomBtn.style.display = 'inline-block';
            joinRoomBtn.style.display = 'inline-block';
            leaveRoomBtn.style.display = 'none';
            
            // 停止联机游戏循环
            if (onlineGameLoop) {
                clearInterval(onlineGameLoop);
                onlineGameLoop = null;
            }
            
            // 重置房间ID
            currentRoomId = null;
            
            // 重置为单人游戏界面
            initGame();
            drawGame();
        });
        
        // 处理联机游戏状态更新
        function handleOnlineGameUpdate(gameData) {
            // 更新玩家状态显示
            if (gameData.players) {
                var p1Ready = gameData.players.p1 && gameData.players.p1.ready;
                var p2Ready = gameData.players.p2 && gameData.players.p2.ready;
                
                playerIndicator.innerHTML = '';
                
                if (gameData.players.p1) {
                    playerIndicator.innerHTML += '<div class="player-tag p1 ' + (p1Ready ? 'ready' : 'not-ready') + '">';
                    playerIndicator.innerHTML += gameData.players.p1.name;
                    playerIndicator.innerHTML += p1Ready ? ' ✅' : ' ⏳';
                    playerIndicator.innerHTML += '</div>';
                }
                
                if (gameData.players.p2) {
                    playerIndicator.innerHTML += '<div class="player-tag p2 ' + (p2Ready ? 'ready' : 'not-ready') + '">';
                    playerIndicator.innerHTML += gameData.players.p2.name;
                    playerIndicator.innerHTML += p2Ready ? ' ✅' : ' ⏳';
                    playerIndicator.innerHTML += '</div>';
                }
                
                playerIndicator.style.display = 'flex';
                
                // 检测双方就绪，由玩家1启动游戏
                if (p1Ready && p2Ready && gameData.state === 'ready' && currentPlayer === 'p1') {
                    startOnlineGameLoop();
                }
            }
            
            // 更新分数
            if (gameData.scores) {
                p1ScoreElement.textContent = gameData.scores.p1 || 0;
                p2ScoreElement.textContent = gameData.scores.p2 || 0;
                onlineScoreBoard.style.display = 'block';
            }
            
            // 处理游戏状态
            switch(gameData.state) {
                case 'waiting':
                    onlineStatus.innerHTML = '<span class="status-waiting">⏳ 等待其他玩家加入...</span>';
                    break;
                    
                case 'ready':
                    onlineStatus.innerHTML = '<span class="status-online">✅ 双方已就绪！等待游戏开始...</span>';
                    break;
                    
                case 'playing':
                    onlineStatus.innerHTML = '<span class="status-online">🎮 游戏进行中</span>';
                    break;
                    
                case 'ended':
                    // 显示胜负结果
                    var winnerText = '';
                    var p1Name = gameData.players && gameData.players.p1 ? gameData.players.p1.name : '玩家1';
                    var p2Name = gameData.players && gameData.players.p2 ? gameData.players.p2.name : '玩家2';
                    var p1Score = gameData.scores && gameData.scores.p1 ? gameData.scores.p1 : 0;
                    var p2Score = gameData.scores && gameData.scores.p2 ? gameData.scores.p2 : 0;
                    
                    if (gameData.winner === 'p1') {
                        winnerText = '<span style="color: #3498db; font-size: 1.2em; font-weight: bold;">🎉 ' + p1Name + ' 获胜！</span>';
                    } else if (gameData.winner === 'p2') {
                        winnerText = '<span style="color: #e74c3c; font-size: 1.2em; font-weight: bold;">🎉 ' + p2Name + ' 获胜！</span>';
                    } else if (gameData.winner === 'draw') {
                        winnerText = '<span style="color: #f39c12; font-size: 1.2em; font-weight: bold;">🤝 平局！</span>';
                    } else {
                        // 没有明确获胜者，比较分数
                        if (p1Score > p2Score) {
                            winnerText = '<span style="color: #3498db; font-size: 1.2em; font-weight: bold;">🎉 ' + p1Name + ' 获胜！</span>';
                        } else if (p2Score > p1Score) {
                            winnerText = '<span style="color: #e74c3c; font-size: 1.2em; font-weight: bold;">� ' + p2Name + ' 获胜！</span>';
                        } else {
                            winnerText = '<span style="color: #f39c12; font-size: 1.2em; font-weight: bold;">🤝 平局！</span>';
                        }
                    }
                    
                    onlineStatus.innerHTML = winnerText + '<br>';
                    onlineStatus.innerHTML += '<span style="font-size: 1.1em;">' + p1Name + ': ' + p1Score + ' 分</span><br>';
                    onlineStatus.innerHTML += '<span style="font-size: 1.1em;">' + p2Name + ': ' + p2Score + ' 分</span><br>';
                    onlineStatus.innerHTML += '<button onclick="leaveRoom()" style="margin-top: 10px; padding: 8px 15px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 15px; cursor: pointer;">🔄 返回房间列表</button>';
                    break;
            }
            
            // 更新蛇的位置
            if (gameData.snake1 && gameData.snake1.segments) {
                onlineSnake1 = gameData.snake1.segments;
            }
            if (gameData.snake2 && gameData.snake2.segments) {
                onlineSnake2 = gameData.snake2.segments;
            }
            if (gameData.food) {
                onlineFood = gameData.food;
            }
        }
        
        // 联机对战键盘事件
        document.addEventListener('keydown', function(e) {
            if (!isOnlineMode || !currentGameId) return;
            
            // 空格键开始游戏（双方就绪后）
            if (e.key === ' ') {
                e.preventDefault();
                setReady(true);
                return;
            }
            
            // 方向键控制
            var direction = null;
            switch(e.key) {
                case 'ArrowUp':
                    direction = 'up';
                    break;
                case 'ArrowDown':
                    direction = 'down';
                    break;
                case 'ArrowLeft':
                    direction = 'left';
                    break;
                case 'ArrowRight':
                    direction = 'right';
                    break;
            }
            
            if (direction) {
                sendPlayerMove(direction);
            }
        });
        
        // 绘制联机对战画面
        function drawOnlineGame() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制玩家1的蛇（蓝色）
            ctx.fillStyle = '#3498db';
            onlineSnake1.forEach(function(segment, index) {
                ctx.fillStyle = index === 0 ? '#5dade2' : '#3498db';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            // 绘制玩家2的蛇（红色）
            ctx.fillStyle = '#e74c3c';
            onlineSnake2.forEach(function(segment, index) {
                ctx.fillStyle = index === 0 ? '#ec7063' : '#e74c3c';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            // 绘制食物
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(onlineFood.x * gridSize + gridSize / 2, onlineFood.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 初始化联机游戏
        function initOnlineGame() {
            onlineSnake1 = [{x: 5, y: 10}];
            onlineSnake2 = [{x: 14, y: 10}];
            onlineFood = { x: 10, y: 10 };
            drawOnlineGame();
        }
        
        // 启动联机游戏循环
        function startOnlineGameLoop() {
            if (onlineGameLoop) return;
            
            // 初始化蛇位置
            realtimeDb.ref('games/' + currentGameId).update({
                snake1: { segments: [{x: 5, y: 10}], direction: 'right' },
                snake2: { segments: [{x: 14, y: 10}], direction: 'left' },
                food: { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) },
                state: 'playing',
                scores: { p1: 0, p2: 0 }
            });
            
            // 只有创建房间的玩家（p1）运行游戏逻辑
            if (currentPlayer === 'p1') {
                onlineGameLoop = setInterval(function() {
                    realtimeDb.ref('games/' + currentGameId).once('value').then(function(snapshot) {
                        var gameData = snapshot.val();
                        if (!gameData || gameData.state !== 'playing') {
                            clearInterval(onlineGameLoop);
                            onlineGameLoop = null;
                            return;
                        }
                        
                        var snake1 = gameData.snake1 || { segments: [], direction: 'right' };
                        var snake2 = gameData.snake2 || { segments: [], direction: 'left' };
                        var food = gameData.food || { x: 10, y: 10 };
                        var scores = gameData.scores || { p1: 0, p2: 0 };
                        
                        // 移动玩家1的蛇
                        var newSnake1 = moveSnake(snake1.segments, snake1.direction);
                        
                        // 移动玩家2的蛇
                        var newSnake2 = moveSnake(snake2.segments, snake2.direction);
                        
                        // 检测玩家1是否吃到食物
                        var p1Ate = checkCollision(newSnake1[0], food);
                        if (p1Ate) {
                            food = generateFood(newSnake1.concat(newSnake2));
                            scores.p1 = (scores.p1 || 0) + 10;
                        } else {
                            newSnake1.pop();
                        }
                        
                        // 检测玩家2是否吃到食物
                        var p2Ate = checkCollision(newSnake2[0], food);
                        if (p2Ate) {
                            food = generateFood(newSnake1.concat(newSnake2));
                            scores.p2 = (scores.p2 || 0) + 10;
                        } else {
                            newSnake2.pop();
                        }
                        
                        // 检测碰撞
                        var gameOver = false;
                        var winner = null;
                        
                        // 检测蛇自身碰撞
                        if (checkSelfCollision(newSnake1)) {
                            gameOver = true;
                            winner = 'p2';
                        }
                        if (checkSelfCollision(newSnake2)) {
                            gameOver = true;
                            winner = winner ? 'draw' : 'p1';
                        }
                        
                        // 检测蛇之间碰撞
                        if (checkSnakeCollision(newSnake1, newSnake2)) {
                            gameOver = true;
                            winner = 'draw';
                        }
                        
                        // 检测墙壁碰撞（困难模式规则）
                        if (checkWallCollision(newSnake1[0])) {
                            gameOver = true;
                            winner = 'p2';
                        }
                        if (checkWallCollision(newSnake2[0])) {
                            gameOver = true;
                            winner = winner ? 'draw' : 'p1';
                        }
                        
                        var newState = gameOver ? 'ended' : 'playing';
                        
                        realtimeDb.ref('games/' + currentGameId).update({
                            snake1: { segments: newSnake1, direction: snake1.direction },
                            snake2: { segments: newSnake2, direction: snake2.direction },
                            food: food,
                            scores: scores,
                            state: newState,
                            winner: winner
                        });
                    });
                }, 150);
            }
            
            // 所有玩家都运行绘制循环
            setInterval(drawOnlineGame, 50);
        }
        
        // 移动蛇
        function moveSnake(segments, direction) {
            if (!segments || segments.length === 0) return [{x: 0, y: 0}];
            
            var newSegments = JSON.parse(JSON.stringify(segments));
            var head = { x: newSegments[0].x, y: newSegments[0].y };
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            newSegments.unshift(head);
            return newSegments;
        }
        
        // 检测碰撞
        function checkCollision(segment1, segment2) {
            return segment1.x === segment2.x && segment1.y === segment2.y;
        }
        
        // 检测自身碰撞
        function checkSelfCollision(segments) {
            if (segments.length < 2) return false;
            var head = segments[0];
            for (var i = 1; i < segments.length; i++) {
                if (checkCollision(head, segments[i])) return true;
            }
            return false;
        }
        
        // 检测蛇之间碰撞
        function checkSnakeCollision(snake1, snake2) {
            var head1 = snake1[0];
            var head2 = snake2[0];
            
            for (var i = 0; i < snake2.length; i++) {
                if (checkCollision(head1, snake2[i])) return true;
            }
            for (var i = 0; i < snake1.length; i++) {
                if (checkCollision(head2, snake1[i])) return true;
            }
            return false;
        }
        
        // 检测墙壁碰撞
        function checkWallCollision(head) {
            return head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
        }
        
        // 生成食物
        function generateFood(snakeSegments) {
            var food;
            do {
                food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            } while (snakeSegments.some(function(segment) {
                return checkCollision(segment, food);
            }));
            return food;
        }
        
        // 页面加载时初始化联机游戏画面
        initOnlineGame();
    </script>
