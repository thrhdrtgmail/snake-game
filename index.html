<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 4em;
            color: #4ecca3;
            text-shadow: 0 0 20px rgba(78, 204, 163, 0.5);
            margin-bottom: 60px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .menu-btn {
            padding: 20px 60px;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-single {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .btn-single:hover {
            background: linear-gradient(135deg, #2980b9, #2471a3);
        }

        .btn-link {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .btn-link:hover {
            background: linear-gradient(135deg, #c0392b, #a93226);
        }

        .btn-rank {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }

        .btn-rank:hover {
            background: linear-gradient(135deg, #e67e22, #d35400);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1 class="title">🐍 贪吃蛇游戏</h1>
    
    <div class="menu-container">
        <button class="menu-btn btn-single" onclick="location.href='single.html'">🎮 单人游戏</button>
        <button class="menu-btn btn-link" onclick="location.href='link.html'">🌐 联机对战</button>
        <button class="menu-btn btn-rank" onclick="location.href='rank.html'">🏆 排行榜</button>
    </div>

    <div class="footer">使用方向键控制 | 按 Enter 开始游戏</div>
</body>
</html>
