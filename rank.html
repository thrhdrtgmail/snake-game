<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 排行榜</title>
    <!-- 使用 Firebase 8.x CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .back-btn {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .title {
            font-size: 2.5em;
            color: #4ecca3;
            text-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
        }

        .rank-container {
            display: flex;
            gap: 40px;
        }

        .rank-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .rank-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid;
        }

        .rank-title.easy {
            color: #27ae60;
            border-color: #27ae60;
        }

        .rank-title.hard {
            color: #e74c3c;
            border-color: #e74c3c;
        }

        .rank-list {
            list-style: none;
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .rank-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .rank-item.top3 {
            background: rgba(255, 215, 0, 0.1);
        }

        .rank-item.top3.rank1 {
            background: rgba(255, 215, 0, 0.2);
        }

        .rank-item.top3.rank2 {
            background: rgba(192, 192, 192, 0.2);
        }

        .rank-item.top3.rank3 {
            background: rgba(205, 127, 50, 0.2);
        }

        .rank-number {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.1em;
            margin-right: 15px;
        }

        .rank-number.gold {
            background: linear-gradient(135deg, #ffd700, #ffb700);
            color: #1a1a2e;
        }

        .rank-number.silver {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #1a1a2e;
        }

        .rank-number.bronze {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            color: #1a1a2e;
        }

        .rank-number.normal {
            background: rgba(255, 255, 255, 0.1);
            color: #888;
        }

        .rank-info {
            flex: 1;
        }

        .rank-player {
            font-weight: bold;
            color: #fff;
            margin-bottom: 3px;
        }

        .rank-score {
            font-size: 0.9em;
            color: #4ecca3;
        }

        .no-data {
            text-align: center;
            color: #888;
            padding: 30px;
        }

        .refresh-btn {
            padding: 10px 25px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='index.html'">← 返回首页</button>
        <h1 class="title">🏆 排行榜</h1>
    </div>

    <div class="rank-container">
        <div class="rank-panel">
            <div class="rank-title easy">🌿 简单模式</div>
            <ul class="rank-list" id="easyLeaderboard">
                <li class="no-data">加载中...</li>
            </ul>
        </div>

        <div class="rank-panel">
            <div class="rank-title hard">🔥 困难模式</div>
            <ul class="rank-list" id="hardLeaderboard">
                <li class="no-data">加载中...</li>
            </ul>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadLeaderboards()">🔄 刷新排行榜</button>
    <button class="refresh-btn" onclick="testFirestore()" style="background: #3498db; margin-left: 10px;">🔍 测试连接</button>

    <script src="firebase-config.js"></script>
    <script>
        function loadLeaderboards() {
            console.log('开始加载排行榜...');
            loadLeaderboard('easy', 'easyLeaderboard');
            loadLeaderboard('hard', 'hardLeaderboard');
        }

        function testFirestore() {
            console.log('=== 测试 Firestore 连接 ===');
            
            // 检查 Firebase 是否加载
            if (typeof firebase === 'undefined') {
                console.error('❌ Firebase SDK 未加载');
                alert('Firebase SDK 未加载');
                return;
            }
            console.log('✅ Firebase SDK 已加载');
            
            // 检查 Firestore 是否初始化
            if (typeof db === 'undefined' || !db) {
                console.error('❌ Firestore 未初始化');
                alert('Firestore 未初始化');
                return;
            }
            console.log('✅ Firestore 已初始化');
            
            // 只测试查询，不添加记录
            console.log('测试查询文档...');
            db.collection("scores").get().then(function(querySnapshot) {
                console.log('✅ 查询成功, 文档数量:', querySnapshot.size);
                
                // 打印第一条数据查看格式
                if (querySnapshot.size > 0) {
                    querySnapshot.forEach(function(doc) {
                        console.log('文档数据:', doc.data());
                        return false; // 只打印第一条
                    });
                }
                
                alert('Firestore 连接正常！当前有 ' + querySnapshot.size + ' 条记录\n\n请查看控制台获取详细数据格式');
            }).catch(function(error) {
                console.error('❌ 查询失败:', error);
                alert('查询失败: ' + error.message + '\n错误代码: ' + error.code);
            });
        }

        function loadLeaderboard(mode, containerId) {
            console.log('加载排行榜:', mode, containerId);
            getLeaderboard(mode, function(data) {
                console.log('获取到数据:', mode, data);
                var container = document.getElementById(containerId);
                
                if (data.length === 0) {
                    container.innerHTML = '<li class="no-data">暂无数据</li>';
                    return;
                }
                
                container.innerHTML = data.map(function(item, index) {
                    var rankClass = index < 3 ? 'top3' : '';
                    var rankNumberClass = '';
                    switch(index) {
                        case 0: rankNumberClass = 'gold'; break;
                        case 1: rankNumberClass = 'silver'; break;
                        case 2: rankNumberClass = 'bronze'; break;
                        default: rankNumberClass = 'normal';
                    }
                    
                    return '<li class="rank-item ' + rankClass + ' rank' + (index + 1) + '">' +
                        '<div class="rank-number ' + rankNumberClass + '">' + (index + 1) + '</div>' +
                        '<div class="rank-info">' +
                            '<div class="rank-player">' + item.playerName + '</div>' +
                            '<div class="rank-score">' + item.score + ' 分</div>' +
                        '</div>' +
                    '</li>';
                }).join('');
            });
        }

        window.addEventListener('load', loadLeaderboards);
    </script>
</body>
</html>
