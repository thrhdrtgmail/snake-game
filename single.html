<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 单人游戏</title>
    <!-- 使用 Firebase 8.x CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .back-btn {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .title {
            font-size: 2.5em;
            color: #4ecca3;
            text-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .mode-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.5);
        }

        .mode-easy {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .mode-hard {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-wrapper {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
        }

        canvas {
            background: #0a0a0a;
            display: block;
        }

        .score-board {
            font-size: 1.5em;
            color: #4ecca3;
            margin: 15px 0;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-start {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .btn-start:hover {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            transform: translateY(-2px);
        }

        .control-btn {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .control-btn:nth-child(1) {
            background: #f39c12;
        }

        .control-btn:nth-child(1):hover {
            background: #e67e22;
        }

        .control-btn.exit {
            background: #e74c3c;
        }

        .control-btn.exit:hover {
            background: #c0392b;
        }

        .game-over, .game-paused {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 60px;
            border-radius: 20px;
            font-size: 2.5em;
            font-weight: bold;
            color: #e74c3c;
            display: none;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
        }

        .game-paused {
            color: #f39c12;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.5);
        }

        .current-mode {
            color: #fff;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .input-name {
            padding: 10px 15px;
            border: 2px solid #3498db;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1em;
            margin-bottom: 15px;
            width: 200px;
        }

        .input-name::placeholder {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='index.html'">← 返回首页</button>
        <h1 class="title">🐍 贪吃蛇</h1>
    </div>

    <div class="mode-selector">
        <button class="mode-btn mode-easy active" id="easyModeBtn">简单模式</button>
        <button class="mode-btn mode-hard" id="hardModeBtn">困难模式</button>
    </div>

    <div class="current-mode" id="currentMode">当前模式: 简单模式</div>

    <input type="text" class="input-name" id="playerNameInput" placeholder="输入你的昵称">

    <div class="game-container">
        <div class="game-area">
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div class="game-over" id="gameOver">游戏结束！</div>
                <div class="game-paused" id="gamePaused">⏸️ 游戏暂停</div>
            </div>
            
            <div class="score-board">得分: <span class="score" id="score">0</span></div>
            
            <button class="btn btn-start" id="startBtn">开始游戏</button>
            
            <div class="controls">
                <button class="control-btn" id="pauseBtn">⏸️ 暂停</button>
                <button class="control-btn exit" id="exitBtn">❌ 退出</button>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const exitBtn = document.getElementById('exitBtn');
        const gameOverElement = document.getElementById('gameOver');
        const gamePausedElement = document.getElementById('gamePaused');
        const easyModeBtn = document.getElementById('easyModeBtn');
        const hardModeBtn = document.getElementById('hardModeBtn');
        const currentModeElement = document.getElementById('currentMode');
        const playerNameInput = document.getElementById('playerNameInput');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let dx = gridSize;
        let dy = 0;
        let food = { x: 10 * gridSize, y: 10 * gridSize };
        let score = 0;
        let gameLoop = null;
        let isGameRunning = false;
        let isPaused = false;
        let gameMode = 'easy';

        function initGame() {
            snake = [{x: 10 * gridSize, y: 10 * gridSize}];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            gamePausedElement.style.display = 'none';
            generateFood();
            drawGame();
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount) * gridSize,
                    y: Math.floor(Math.random() * tileCount) * gridSize
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            food = newFood;
        }

        function drawGame() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(food.x + gridSize / 2, food.y + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#4ecca3' : '#2ecc71';
                ctx.fillRect(segment.x, segment.y, gridSize - 2, gridSize - 2);
            });
        }

        function gameStep() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 简单模式：穿墙
            if (gameMode === 'easy') {
                if (head.x < 0) head.x = canvas.width - gridSize;
                if (head.x >= canvas.width) head.x = 0;
                if (head.y < 0) head.y = canvas.height - gridSize;
                if (head.y >= canvas.height) head.y = 0;
            } else {
                // 困难模式：撞墙死亡
                if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                    gameOver();
                    return;
                }
            }

            // 检查自身碰撞
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }

            drawGame();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            gameOverElement.style.display = 'block';
            startBtn.textContent = '重新开始';
            
            // 保存分数到数据库
            const playerName = playerNameInput.value || '匿名玩家';
            saveScore(playerName, score, gameMode);
        }

        function startGame() {
            if (isGameRunning) return;

            isGameRunning = true;
            isPaused = false;
            initGame();
            startBtn.textContent = '游戏中...';
            gameLoop = setInterval(gameStep, 100);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!isGameRunning) {
                    startGame();
                }
                return;
            }

            if (!isGameRunning || isPaused) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (dy === 0) { dx = 0; dy = -gridSize; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { dx = 0; dy = gridSize; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { dx = -gridSize; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { dx = gridSize; dy = 0; }
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);

        pauseBtn.addEventListener('click', () => {
            if (!isGameRunning) return;

            if (!isPaused) {
                isPaused = true;
                clearInterval(gameLoop);
                gamePausedElement.style.display = 'block';
                pauseBtn.textContent = '▶️ 继续';
            } else {
                isPaused = false;
                gamePausedElement.style.display = 'none';
                pauseBtn.textContent = '⏸️ 暂停';
                gameLoop = setInterval(gameStep, 100);
            }
        });

        exitBtn.addEventListener('click', () => {
            isGameRunning = false;
            clearInterval(gameLoop);
            gameOverElement.style.display = 'none';
            gamePausedElement.style.display = 'none';
            startBtn.textContent = '开始游戏';
            initGame();
        });

        easyModeBtn.addEventListener('click', () => {
            if (isGameRunning) return;
            gameMode = 'easy';
            easyModeBtn.classList.add('active');
            hardModeBtn.classList.remove('active');
            currentModeElement.textContent = '当前模式: 简单模式';
        });

        hardModeBtn.addEventListener('click', () => {
            if (isGameRunning) return;
            gameMode = 'hard';
            hardModeBtn.classList.add('active');
            easyModeBtn.classList.remove('active');
            currentModeElement.textContent = '当前模式: 困难模式';
        });

        initGame();
    </script>
</body>
</html>
